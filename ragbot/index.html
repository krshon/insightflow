<!DOCTYPE html>
<html>
<head>
  <title>InsightFlow CSV Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #06101f;
      --surface:     #0d1e36;
      --border:      rgba(255,255,255,0.07);
      --accent:      #2563eb;
      --white:       #ffffff;
      --muted:       rgba(255,255,255,0.35);
      --text:        rgba(255,255,255,0.88);
      --bot-bg:      #111f38;
      --user-bg:     #1d4ed8;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(37,99,235,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      animation: fadeDown 0.4s ease both;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .brand { flex: 1; }

    .brand h1 {
      font-size: 14.5px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .brand p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      font-weight: 300;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2.5s ease infinite;
    }

    /* Chat */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    #chat-window::-webkit-scrollbar { display: none; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 24px 0;
      gap: 6px;
      animation: fadeUp 0.4s ease both;
      transition: opacity 0.2s;
    }

    .welcome-glyph {
      width: 48px;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .welcome h2 {
      font-size: 18px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .welcome > p {
      font-size: 12.5px;
      color: var(--muted);
      text-align: center;
      max-width: 300px;
      line-height: 1.7;
      font-weight: 300;
      margin-top: 2px;
    }

    .prompts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 460px;
      margin-top: 18px;
    }

    .prompt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s, background 0.18s, transform 0.14s;
      font-family: 'Inter', sans-serif;
    }

    .prompt-card:hover {
      border-color: rgba(37,99,235,0.5);
      background: rgba(37,99,235,0.07);
      transform: translateY(-1px);
    }

    .prompt-card:active { transform: translateY(0); }

    .prompt-label {
      display: block;
      font-size: 9.5px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 4px;
    }

    .prompt-text {
      display: block;
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
      font-weight: 400;
    }

    /* Messages */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: msgIn 0.22s ease both;
    }

    .msg-group.user { align-items: flex-end; }
    .msg-group.bot  { align-items: flex-start; }

    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      padding: 0 4px 3px;
      display: flex;
      gap: 5px;
    }

    .msg-meta-name { font-weight: 500; color: rgba(255,255,255,0.45); }

    .bubble {
      max-width: 74%;
      padding: 10px 15px;
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
      border-radius: 15px;
    }

    .bubble.bot {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Typing */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 13px 16px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(37,99,235,0.7);
      animation: blink 1.2s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* Input */
    .input-area {
      flex-shrink: 0;
      padding: 12px 24px 22px;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.4s 0.1s ease both;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 7px 7px 7px 15px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .input-row:focus-within {
      border-color: rgba(37,99,235,0.55);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.09);
    }

    #question {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      caret-color: var(--accent);
    }

    #question::placeholder { color: var(--muted); font-weight: 300; }
    #question:disabled { opacity: 0.4; }

    #send-btn {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.14s;
    }

    #send-btn:hover  { opacity: 0.85; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 15px; height: 15px; }

    .input-hint {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin-top: 7px;
      font-weight: 300;
    }

    .bubble.bot ul {
      margin: 6px 0 4px 18px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .bubble.bot li { line-height: 1.6; }

    .bubble.bot p { margin: 4px 0; }
    .bubble.bot p:first-child { margin-top: 0; }
    .bubble.bot p:last-child  { margin-bottom: 0; }

    .bubble.bot strong { color: #fff; font-weight: 500; }
    .bubble.bot em { font-style: italic; opacity: 0.85; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>

<body>
<div class="shell">

  <header>
    <div class="logo-mark">📊</div>
    <div class="brand">
      <h1>InsightFlow</h1>
      <p>Superstore Sales · RAG Analysis</p>
    </div>
    <div class="live-pill">
      <span class="live-dot"></span>
      Live
    </div>
  </header>

  <div id="chat-window">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-glyph">🏪</div>
      <h2>Your AI Sales Analyst</h2>
      <p>Ask anything about the Superstore dataset — performance, risk, strategy, and more.</p>

      <div class="prompts">
        <button class="prompt-card" onclick="fillAndSend('Which region has the highest sales and profit overall?')">
          <span class="prompt-label">Performance</span>
          <span class="prompt-text">Which region has the highest sales and profit overall?</span>
        </button>

        <button class="prompt-card" onclick="fillAndSend('Which category is least profitable and needs improvement?')">
          <span class="prompt-label">Risk</span>
          <span class="prompt-text">Which category is least profitable and needs improvement?</span>
        </button>

        <button class="prompt-card" onclick="fillAndSend('Which customer segment generates the most revenue?')">
          <span class="prompt-label">Strategy</span>
          <span class="prompt-text">Which customer segment generates the most revenue?</span>
        </button>

        <button class="prompt-card" onclick="fillAndSend('Give 5 key business insights from this dataset.')">
          <span class="prompt-label">⭐ Executive</span>
          <span class="prompt-text">Give 5 key business insights from this dataset.</span>
        </button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input
        id="question"
        placeholder="Ask about sales, profit, regions, segments…"
        autocomplete="off"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQuestion();}"
      />
      <button id="send-btn" onclick="askQuestion()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · InsightFlow RAG · localhost:3000</p>
  </div>

</div>

<script>
  let isLoading = false;

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function removeWelcome() {
    const w = document.getElementById('welcome-screen');
    if (w) {
      w.style.opacity = '0';
      setTimeout(() => w.remove(), 200);
    }
  }

  function fillAndSend(text) {
    document.getElementById('question').value = text;
    askQuestion();
  }

  function appendMessage(text, role) {
    removeWelcome();
    const win = document.getElementById('chat-window');

    const group = document.createElement('div');
    group.className = `msg-group ${role}`;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = `<span class="msg-meta-name">${role === 'bot' ? 'InsightFlow' : 'You'}</span><span>${getTime()}</span>`;

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    if (role === 'bot') {
      bubble.innerHTML = parseMarkdown(text);
    } else {
      bubble.textContent = text;
    }

    group.appendChild(meta);
    group.appendChild(bubble);
    win.appendChild(group);
    win.scrollTop = win.scrollHeight;
  }

  function showTyping() {
    removeWelcome();
    const win = document.getElementById('chat-window');
    const group = document.createElement('div');
    group.className = 'msg-group bot';
    group.id = 'typing-row';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot typing-dots';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    group.appendChild(bubble);
    win.appendChild(group);
    win.scrollTop = win.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  function setLoading(on) {
    isLoading = on;
    document.getElementById('question').disabled = on;
    document.getElementById('send-btn').disabled = on;
  }

  function parseMarkdown(text) {
    return text
      // Bold **text**
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic *text*
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Bullet list lines starting with * or -
      .replace(/^[\*\-] (.+)/gm, '<li>$1</li>')
      // Numbered list
      .replace(/^\d+\. (.+)/gm, '<li>$1</li>')
      // Wrap consecutive <li> in <ul>
      .replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`)
      // Line breaks
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      // Wrap in paragraph
      .replace(/^(.+)/, '<p>$1')
      .replace(/(.+)$/, '$1</p>');
  }

  async function askQuestion() {
    if (isLoading) return;
    const input = document.getElementById('question');
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    appendMessage(question, 'user');
    showTyping();
    setLoading(true);

    try {
      const res = await fetch("http://localhost:3000/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });

      const data = await res.json();
      hideTyping();
      appendMessage(data.answer, 'bot');
    } catch (err) {
      hideTyping();
      appendMessage('Unable to reach the server. Please ensure localhost:3000 is running.', 'bot');
    } finally {
      setLoading(false);
      input.focus();
    }
  }
</script>
</body>
</html>
